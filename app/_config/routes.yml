---
Name: approutes
After:
  - '#rootroutes'
  - '#coreroutes'
---
SilverStripe\Control\Director:
  rules:
    '': 'App\Controllers\PhotoboxController'
    'photobox': 'App\Controllers\PhotoboxController'
    'photobox//$Action': 'App\Controllers\PhotoboxController'
    'capture//$Action': 'App\Controllers\PhotoboxController'
    'person-selection//$Action': 'App\Controllers\PhotoboxController'
    'success//$Action': 'App\Controllers\PhotoboxController'
    'download/$Hash': 'App\Controllers\PhotoDownloadController'
    'api//$Action//$ID/$Name': 'App\Controllers\ApiController'
